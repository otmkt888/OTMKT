<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预测阿根廷2026世界杯之路 - 12BET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 阿根廷配色 */
            --argentina-blue: #75AADB;
            --argentina-dark-blue: #1E3A8A;
            --argentina-light-blue: #93C5FD;
            --gold-primary: #FFD700;
            --gold-dark: #FFA500;
            --gold-light: #FFED4E;
            
            /* 深色背景 */
            --bg-primary: #0A1628;
            --bg-secondary: #0F172A;
            --bg-tertiary: #1E293B;
            
            /* 文字 */
            --text-primary: #FFFFFF;
            --text-secondary: #E2E8F0;
            --text-accent: var(--gold-primary);
            
            /* 特效 */
            --glow-gold: 0 0 20px rgba(255, 215, 0, 0.4);
            --glow-blue: 0 0 30px rgba(117, 170, 219, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* 動態網格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(117, 170, 219, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(117, 170, 219, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Logo 區域 - 純黑背景加光暈 */
        .logo-bar {
            background: #000000;
            padding: 20px 0;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .logo-bar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--gold-primary) 20%, 
                var(--gold-primary) 80%, 
                transparent);
            box-shadow: var(--glow-gold);
        }

        .logo-bar img {
            height: 50px;
            width: auto;
            max-width: 180px;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
        }

        /* Hero 區域 - 運動場館風格 */
        .hero {
            position: relative;
            height: 650px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) saturate(1.2);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at center, 
                    rgba(10, 22, 40, 0.3) 0%, 
                    rgba(10, 22, 40, 0.8) 70%,
                    rgba(10, 22, 40, 0.95) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 60px 20px 40px;
        }

        /* 主標題 - 運動風格大字 */
        .main-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px;
            font-weight: 400;
            letter-spacing: 3px;
            line-height: 1.1;
            margin-bottom: 15px;
            background: linear-gradient(180deg, 
                #FFFFFF 0%, 
                var(--gold-light) 50%,
                var(--gold-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            animation: titlePulse 3s ease-in-out infinite;
            text-transform: uppercase;
        }

        @keyframes titlePulse {
            0%, 100% {
                filter: brightness(1) drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
            }
            50% {
                filter: brightness(1.2) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
            }
        }

        .sub-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--argentina-light-blue);
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* 獎金卡片 - 高端設計 */
        .prize-container {
            display: flex;
            gap: 15px;
            max-width: 420px;
            margin: 0 auto;
            perspective: 1000px;
        }

        .prize-card {
            flex: 1;
            background: linear-gradient(135deg, 
                rgba(255, 215, 0, 0.15) 0%,
                rgba(255, 165, 0, 0.1) 100%);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: cardFloat 3s ease-in-out infinite;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .prize-card:nth-child(1) {
            animation-delay: 0s;
        }

        .prize-card:nth-child(2) {
            animation-delay: 0.5s;
        }

        .prize-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent, 
                rgba(255, 255, 255, 0.05), 
                transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes cardFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-8px) scale(1.02);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .prize-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--gold-light);
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .prize-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #FFFFFF;
            letter-spacing: 1px;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
        }

        /* 表單區域 */
        .form-section {
            padding: 50px 20px;
            background: linear-gradient(180deg, 
                var(--bg-primary) 0%, 
                var(--bg-secondary) 100%);
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            text-align: center;
            font-size: 36px;
            font-weight: 400;
            letter-spacing: 3px;
            color: var(--text-primary);
            margin-bottom: 35px;
            text-transform: uppercase;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--gold-primary);
            box-shadow: var(--glow-gold);
        }

        /* 選項按鈕 - 運動卡片風格 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 40px;
        }

        .option-btn {
            background: linear-gradient(135deg, 
                rgba(30, 58, 138, 0.4) 0%,
                rgba(15, 23, 42, 0.6) 100%);
            border: 2px solid rgba(117, 170, 219, 0.3);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, 
                rgba(117, 170, 219, 0.3) 0%, 
                transparent 70%);
            transition: transform 0.6s ease;
        }

        .option-btn:hover::before {
            transform: translate(-50%, -50%) scale(1.5);
        }

        .option-btn:hover {
            transform: translateY(-5px) scale(1.03);
            border-color: var(--argentina-blue);
            box-shadow: 
                0 12px 40px rgba(117, 170, 219, 0.4),
                var(--glow-blue);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, 
                var(--argentina-blue) 0%, 
                var(--argentina-dark-blue) 100%);
            border-color: var(--gold-primary);
            box-shadow: 
                0 15px 50px rgba(117, 170, 219, 0.5),
                0 0 0 3px rgba(255, 215, 0, 0.3);
            transform: translateY(-5px) scale(1.05);
        }

        .option-btn.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 24px;
            color: var(--gold-primary);
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .option-icon {
            font-size: 42px;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .option-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #FFFFFF;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        /* 提交按鈕 - 行動號召 */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, 
                var(--gold-primary) 0%, 
                var(--gold-dark) 100%);
            border: none;
            border-radius: 50px;
            padding: 22px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 3px;
            color: #000000;
            cursor: pointer;
            box-shadow: 
                0 10px 40px rgba(255, 165, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                transparent);
            animation: buttonShine 3s infinite;
        }

        @keyframes buttonShine {
            0% { left: -100%; }
            50%, 100% { left: 200%; }
        }

        .submit-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 15px 50px rgba(255, 165, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px) scale(1);
        }

        .submit-btn:disabled {
            background: #4B5563;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 促銷Banner */
        .promo-banner {
            display: block;
            margin: 40px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            position: relative;
        }

        .promo-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                transparent 0%, 
                rgba(255, 215, 0, 0.1) 50%, 
                transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .promo-banner:hover::before {
            opacity: 1;
        }

        .promo-banner:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(255, 215, 0, 0.3);
        }

        .promo-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 條款說明 */
        .terms {
            margin-top: 40px;
            padding: 25px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            border-left: 4px solid var(--gold-primary);
            backdrop-filter: blur(10px);
        }

        .terms-item {
            font-size: 13px;
            color: rgba(226, 232, 240, 0.8);
            margin-bottom: 12px;
            line-height: 1.7;
            padding-left: 20px;
            position: relative;
        }

        .terms-item::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--gold-primary);
            font-weight: bold;
        }

        .terms-item:last-child {
            margin-bottom: 0;
        }

        /* 結果頁面 */
        .result-page {
            display: none;
            min-height: 100vh;
            background: linear-gradient(180deg, 
                var(--bg-primary) 0%, 
                var(--bg-secondary) 100%);
        }

        .result-page.active {
            display: block;
        }

        .result-hero {
            position: relative;
            height: 500px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .result-hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        .result-hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(10, 22, 40, 0.3) 0%, 
                rgba(10, 22, 40, 0.9) 100%);
            z-index: 1;
        }

        .result-hero-content {
            position: relative;
            z-index: 2;
            padding: 80px 20px 40px;
            text-align: center;
        }

        .result-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            font-weight: 400;
            letter-spacing: 3px;
            color: var(--gold-primary);
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            animation: celebrationBounce 1s ease-in-out infinite;
        }

        @keyframes celebrationBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .total-votes {
            font-size: 18px;
            font-weight: 600;
            color: var(--argentina-light-blue);
            letter-spacing: 1px;
        }

        .your-choice {
            background: linear-gradient(135deg, 
                var(--argentina-blue) 0%, 
                var(--argentina-dark-blue) 100%);
            border-radius: 20px;
            padding: 25px;
            max-width: 320px;
            margin: 0 auto;
            box-shadow: 
                0 15px 50px rgba(117, 170, 219, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .your-choice-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .your-choice-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            font-weight: 400;
            color: var(--gold-primary);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* 結果列表 */
        .results-list {
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .result-item {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 18px;
            border: 2px solid rgba(117, 170, 219, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .result-item:hover {
            transform: translateX(5px);
            border-color: rgba(117, 170, 219, 0.4);
        }

        .result-item.highlight {
            border-color: var(--gold-primary);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .result-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-option {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #FFFFFF;
        }

        .result-stats {
            text-align: right;
        }

        .result-votes {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .result-percentage {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            font-weight: 400;
            color: var(--gold-primary);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, 
                var(--argentina-blue) 0%, 
                var(--gold-primary) 100%);
            border-radius: 10px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0;
            box-shadow: 0 0 15px rgba(117, 170, 219, 0.6);
        }

        /* 行動按鈕 */
        .action-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 0 20px 20px;
            padding: 18px;
            border-radius: 50px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .action-btn-primary {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.15) 0%, 
                rgba(255, 255, 255, 0.05) 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #FFFFFF;
        }

        .action-btn-primary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .telegram-btn {
            background: linear-gradient(135deg, 
                #0088cc 0%, 
                #229ED9 100%);
            border: none;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 136, 204, 0.4);
        }

        .telegram-btn:hover {
            background: linear-gradient(135deg, 
                #229ED9 0%, 
                #0088cc 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 136, 204, 0.6);
        }

        .telegram-btn img {
            width: 28px;
            height: 28px;
        }

        /* WhatsApp 浮動按鈕 */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(37, 211, 102, 0.7);
        }

        .whatsapp-float svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        /* 彩帶效果 */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 25px;
            background: linear-gradient(135deg, 
                rgba(255, 215, 0, 0.4) 0%, 
                rgba(255, 237, 78, 0.6) 50%, 
                rgba(255, 165, 0, 0.4) 100%);
            opacity: 0.6;
            border-radius: 2px;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
        }

        /* 響應式設計 */
        @media (max-width: 480px) {
            .main-title {
                font-size: 42px;
            }

            .sub-title {
                font-size: 17px;
            }

            .prize-card {
                padding: 20px 12px;
            }

            .prize-value {
                font-size: 24px;
            }

            .section-title {
                font-size: 30px;
            }

            .option-btn {
                padding: 24px 15px;
            }

            .option-icon {
                font-size: 36px;
            }

            .option-text {
                font-size: 22px;
            }

            .submit-btn {
                font-size: 24px;
                padding: 20px;
            }

            .result-title {
                font-size: 36px;
            }

            .hero {
                height: 580px;
            }

            .result-hero {
                height: 450px;
            }
        }

        /* 彩帶動畫 */
        @keyframes confettiFall {
            0% {
                transform: translateY(-50px) rotate(0deg) rotateY(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            95% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(calc(100vh + 100px)) rotate(720deg) rotateY(1080deg);
                opacity: 0;
            }
        }

        @keyframes sway {
            0%, 100% {
                transform: translateX(-20px);
            }
            50% {
                transform: translateX(20px);
            }
        }

        .confetti {
            animation: confettiFall 4s linear infinite, sway 2s ease-in-out infinite;
        }

        /* 星星閃爍 */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }

        /* 煙火效果 */

            height: 4px;

        /* 新增：光粒子效果 */

    <script>
        const optionButtons = document.querySelectorAll('.option-btn');
        const submitBtn = document.getElementById('submitBtn');
        const votingPage = document.getElementById('votingPage');
        const resultPage = document.getElementById('resultPage');
        let selectedOption = null;

        const optionLabels = {
            'champion': '冠军',
            'semifinal': '4强',
            'quarterfinal': '8强',
            'round16': '16强'
        };

        // 選項按鈕
        optionButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                optionButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedOption = btn.dataset.value;
                submitBtn.disabled = false;
                
                // 點擊特效
                createFirework(btn.getBoundingClientRect().left + btn.offsetWidth / 2, 
                              btn.getBoundingClientRect().top + btn.offsetHeight / 2);
            });
        });

        // 提交投票
        submitBtn.addEventListener('click', () => {
            if (!selectedOption) return;

            // 收集數據
            collectVoteData(selectedOption);

            // 生成結果
            const totalVotes = Math.floor(Math.random() * 50000) + 80000;
            const votes = generateVoteData(totalVotes, selectedOption);

            // 顯示結果頁
            votingPage.style.display = 'none';
            resultPage.classList.add('active');
            displayResults(votes, totalVotes, selectedOption);

            // 慶祝特效
            const rect = submitBtn.getBoundingClientRect();
            createFirework(rect.left + rect.width / 2, rect.top + rect.height / 2);
            document.getElementById('coinContainer').innerHTML = '';

            window.scrollTo(0, 0);
        });

        // Google Sheets 數據收集
        function collectVoteData(vote) {
            const deviceInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                viewport: `${window.innerWidth}x${window.innerHeight}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer || 'Direct'
            };

            const data = {
                timestamp: new Date().toISOString(),
                vote: optionLabels[vote],
                voteValue: vote,
                userAgent: deviceInfo.userAgent,
                platform: deviceInfo.platform,
                language: deviceInfo.language,
                screenResolution: deviceInfo.screenResolution,
                viewport: deviceInfo.viewport,
                timezone: deviceInfo.timezone,
                referrer: deviceInfo.referrer
            };

            sendToGoogleSheets(data);
        }

        function sendToGoogleSheets(data) {
            const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';
            
            if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_URL_HERE') {
                console.log('📊 投票數據 (尚未連接Google Sheets):', data);
                const existingData = JSON.parse(localStorage.getItem('voteData') || '[]');
                existingData.push(data);
                localStorage.setItem('voteData', JSON.stringify(existingData));
                console.log('✅ 數據已暫存到瀏覽器 localStorage');
                return;
            }

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(() => console.log('✅ 投票數據已發送到 Google Sheets'))
            .catch(error => {
                console.error('❌ 發送失敗:', error);
                const existingData = JSON.parse(localStorage.getItem('voteData') || '[]');
                existingData.push(data);
                localStorage.setItem('voteData', JSON.stringify(existingData));
            });
        }

        function generateVoteData(total, userChoice) {
            let remaining = total;
            const votes = {};
            
            votes.champion = Math.floor(total * (0.40 + Math.random() * 0.10));
            remaining -= votes.champion;
            
            votes.semifinal = Math.floor(remaining * (0.35 + Math.random() * 0.10));
            remaining -= votes.semifinal;
            
            votes.quarterfinal = Math.floor(remaining * (0.50 + Math.random() * 0.15));
            remaining -= votes.quarterfinal;
            
            votes.round16 = remaining;

            if (userChoice && votes[userChoice]) {
                const boost = Math.floor(total * 0.02);
                votes[userChoice] += boost;
            }

            return votes;
        }

        function displayResults(votes, total, userChoice) {
            document.getElementById('totalVotes').textContent = total.toLocaleString();
            document.getElementById('userChoice').textContent = optionLabels[userChoice];

            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            const sortedOptions = Object.entries(votes).sort((a, b) => b[1] - a[1]);

            sortedOptions.forEach(([option, voteCount]) => {
                const percentage = ((voteCount / total) * 100).toFixed(1);
                const isUserChoice = option === userChoice;

                const resultItem = document.createElement('div');
                resultItem.className = `result-item ${isUserChoice ? 'highlight' : ''}`;
                resultItem.innerHTML = `
                    <div class="result-header-row">
                        <div class="result-option">${optionLabels[option]}</div>
                        <div class="result-stats">
                            <div class="result-votes">${voteCount.toLocaleString()} 票</div>
                            <div class="result-percentage">${percentage}%</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" data-width="${percentage}"></div>
                    </div>
                `;
                resultsList.appendChild(resultItem);
            });

            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.dataset.width + '%';
                });
            }, 100);

            // 慶祝煙火
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * window.innerHeight * 0.5;
                        createFirework(x, y);
                    }, i * 300);
                }
            }, 500);

            startConfettiRain();
        }

        // 彩帶效果
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            
            const styles = ['gold', 'orange', 'yellow'];
            const sizes = ['', 'wide', 'thin'];
            
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-50px';
            confetti.style.animationDelay = Math.random() * 1 + 's';
            confetti.style.animationDuration = (Math.random() * 3 + 4) + 's';
            
            document.getElementById('coinContainer').appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 8000);
        }

        function startConfettiRain() {
            setInterval(createConfetti, 400);
        }

        // 煙火效果
        function createFirework(x, y) {
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f7b731', '#5f27cd'];
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // 創建星星
        function createStars() {
            const heroSections = document.querySelectorAll('.hero, .result-hero');
            heroSections.forEach(section => {
                for (let i = 0; i < 50; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 2 + 's';
                    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    section.appendChild(star);
                }
            });
        }

        // 頁面載入
        window.addEventListener('load', () => {
            createStars();
            startConfettiRain();
            createFloatingDots();
            initCursorGlow();
        });

        // 鼠標光暈跟隨
        function initCursorGlow() {
            const cursorGlow = document.getElementById('cursorGlow');
            let mouseX = 0, mouseY = 0;
            let glowX = 0, glowY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function animateGlow() {
                glowX += (mouseX - glowX) * 0.1;
                glowY += (mouseY - glowY) * 0.1;
                
                cursorGlow.style.left = (glowX - 100) + 'px';
                cursorGlow.style.top = (glowY - 100) + 'px';
                
                requestAnimationFrame(animateGlow);
            }
            
            animateGlow();
        }

        // 創建浮動光點
        function createFloatingDots() {
            const hero = document.querySelector('.hero');
            if (!hero) return;
            
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'floating-dot';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.setProperty('--x', (Math.random() - 0.5) * 100 + 'px');
                dot.style.setProperty('--y', (Math.random() - 0.5) * 100 + 'px');
                dot.style.animationDelay = Math.random() * 3 + 's';
                dot.style.animationDuration = (Math.random() * 2 + 2) + 's';
                hero.appendChild(dot);
            }
        }

        // 增強選項按鈕點擊效果
        optionButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // 波紋效果
                createRipple(e.clientX, e.clientY);
                
                // 煙火效果
                const rect = this.getBoundingClientRect();
                createFirework(rect.left + rect.width / 2, rect.top + rect.height / 2);
                
                // 粒子爆發
                createParticleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
        });

        // 波紋效果
        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 1000);
        }

        // 粒子爆發
        function createParticleBurst(x, y) {
            const colors = ['#FFD700', '#FFA500', '#FFED4E', '#75AADB'];
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--particle-color', colors[Math.floor(Math.random() * colors.length)]);
                particle.style.setProperty('--drift', (Math.random() - 0.5) * 200 + 'px');
                particle.style.setProperty('--duration', (Math.random() * 2 + 2) + 's');
                particle.style.animationDelay = Math.random() * 0.2 + 's';
                
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 4000);
            }
        }

        // 增強提交按鈕效果
        submitBtn.addEventListener('click', function() {
            if (!selectedOption) return;
            
            // 閃電效果
            this.style.animation = 'lightning 0.3s ease-out';
            setTimeout(() => {
                this.style.animation = '';
            }, 300);
            
            // 大型煙火
            const rect = this.getBoundingClientRect();
            createMegaFirework(rect.left + rect.width / 2, rect.top + rect.height / 2);
        });

        // 超級煙火效果
        function createMegaFirework(x, y) {
            const colors = ['#FFD700', '#FFA500', '#FFED4E', '#75AADB', '#FF6B6B', '#4ECDC4'];
            const layers = 3;
            
            for (let layer = 0; layer < layers; layer++) {
                setTimeout(() => {
                    const particleCount = 40 + layer * 10;
                    
                    for (let i = 0; i < particleCount; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'firework';
                        particle.style.left = x + 'px';
                        particle.style.top = y + 'px';
                        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                        particle.style.width = (6 - layer * 1.5) + 'px';
                        particle.style.height = (6 - layer * 1.5) + 'px';
                        
                        const angle = (Math.PI * 2 * i) / particleCount;
                        const velocity = 60 + Math.random() * 40 + layer * 20;
                        const tx = Math.cos(angle) * velocity;
                        const ty = Math.sin(angle) * velocity;
                        
                        particle.style.setProperty('--tx', tx + 'px');
                        particle.style.setProperty('--ty', ty + 'px');
                        particle.style.boxShadow = `0 0 ${8 + layer * 2}px ${colors[Math.floor(Math.random() * colors.length)]}`;
                        
                        document.body.appendChild(particle);
                        setTimeout(() => particle.remove(), 1500);
                    }
                }, layer * 150);
            }
        }

        // 增強數字計數動畫
        function animateValue(element, start, end, duration) {
            let startTime = null;
            
            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const progress = Math.min(timeElapsed / duration, 1);
                
                const value = Math.floor(progress * (end - start) + start);
                element.textContent = value.toLocaleString();
                
                if (progress < 1) {
                    requestAnimationFrame(animation);
                }
            }
            
            requestAnimationFrame(animation);
        }

        // 修改 displayResults 函數以使用動畫計數
        const originalDisplayResults = displayResults;
        displayResults = function(votes, total, userChoice) {
            // 顯示結果
            const totalElement = document.getElementById('totalVotes');
            animateValue(totalElement, 0, total, 2000);
            
            document.getElementById('userChoice').textContent = optionLabels[userChoice];

            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            const sortedOptions = Object.entries(votes).sort((a, b) => b[1] - a[1]);

            sortedOptions.forEach(([option, voteCount], index) => {
                const percentage = ((voteCount / total) * 100).toFixed(1);
                const isUserChoice = option === userChoice;

                const resultItem = document.createElement('div');
                resultItem.className = `result-item ${isUserChoice ? 'highlight' : ''}`;
                resultItem.innerHTML = `
                    <div class="result-header-row">
                        <div class="result-option">${optionLabels[option]}</div>
                        <div class="result-stats">
                            <div class="result-votes"><span class="vote-count">0</span> 票</div>
                            <div class="result-percentage"><span class="percentage-value">0</span>%</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" data-width="${percentage}"></div>
                    </div>
                `;
                resultsList.appendChild(resultItem);
                
                // 延遲數字動畫
                setTimeout(() => {
                    const voteCountElement = resultItem.querySelector('.vote-count');
                    const percentageElement = resultItem.querySelector('.percentage-value');
                    
                    animateValue(voteCountElement, 0, voteCount, 1500);
                    animateValue(percentageElement, 0, parseFloat(percentage), 1500);
                }, index * 100 + 500);
            });

            // 進度條動畫
            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.dataset.width + '%';
                });
            }, 100);

            // 連續煙火慶祝
            setTimeout(() => {
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * window.innerHeight * 0.6;
                        createMegaFirework(x, y);
                    }, i * 400);
                }
            }, 1000);

            // 重新開始彩帶雨
            startConfettiRain();
            
            // 添加浮動光點
            setTimeout(() => {
                createFloatingDots();
            }, 500);
        };

        // 金幣旋轉入場效果
        function createCoinAnimation() {
            const coins = document.querySelectorAll('.prize-value');
            coins.forEach((coin, index) => {
                coin.classList.add('coin-spin');
                coin.style.animationDelay = (index * 0.2) + 's';
            });
        }

        // 頁面載入時觸發金幣動畫
        setTimeout(createCoinAnimation, 300);

        // 滾動視差效果
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const scrolled = window.pageYOffset;
                    const hero = document.querySelector('.hero-bg');
                    if (hero) {
                        hero.style.transform = `translateY(${scrolled * 0.5}px)`;
                    }
                    ticking = false;
                });
                ticking = true;
            }
        });
    </script>
</body>
</html>
