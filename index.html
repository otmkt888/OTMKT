<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预测阿根廷2026世界杯之路 - 12BET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #1a4d7a 0%, #0d2841 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        /* Logo */
        .logo {
            text-align: center;
            padding: 15px 0 10px;
            background: #000000;
            width: 100%;
        }

        .logo img {
            height: 45px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 600px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(0.75);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(13,40,65,0.3) 0%, rgba(13,40,65,0.7) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .main-title {
            font-size: 36px;
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            line-height: 1.2;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub-title {
            font-size: 18px;
            font-weight: 500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            color: #fff;
        }

        .prize-info {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            max-width: 400px;
            margin: 30px auto 0;
        }

        .prize-box {
            flex: 1;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            animation: pulseBig 1.5s ease-in-out infinite;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .prize-label {
            font-size: 13px;
            color: #ffd700;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .prize-value {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Form Section */
        .form-section {
            padding: 30px 20px;
            background: linear-gradient(180deg, #0d2841 0%, #1a4d7a 100%);
        }

        .section-title {
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(119,181,254,0.4);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #77b5fe 0%, #4a90e2 100%);
            border-color: #77b5fe;
            box-shadow: 0 8px 25px rgba(119,181,254,0.5);
        }

        .option-btn.selected::before {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 20px;
            color: #fff;
            font-weight: 900;
        }

        .option-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .option-text {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #9acd32 0%, #7cb928 100%);
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(154,205,50,0.4);
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(154,205,50,0.6);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Terms */
        .terms {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-left: 4px solid #ffd700;
        }

        .terms-item {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
            line-height: 1.6;
            padding-left: 15px;
            position: relative;
        }

        .terms-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #ffd700;
            font-weight: bold;
        }

        /* Promotion Banner */
        .promo-banner {
            display: block;
            margin: 30px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .promo-banner:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .promo-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Result Page */
        .result-page {
            display: none;
            min-height: 100vh;
            background: linear-gradient(180deg, #0d2841 0%, #1a4d7a 100%);
        }

        .result-page.active {
            display: block;
        }

        /* Result Hero */
        .result-hero {
            position: relative;
            width: 100%;
            height: 450px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .result-hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(0.6);
        }

        .result-hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(13,40,65,0.4) 0%, rgba(13,40,65,0.85) 100%);
            z-index: 1;
        }

        .result-hero-content {
            position: relative;
            z-index: 2;
            padding: 60px 20px 30px;
            text-align: center;
        }

        .result-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .result-title {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .total-votes {
            font-size: 16px;
            color: #ffd700;
            font-weight: 600;
        }

        .your-choice {
            background: linear-gradient(135deg, #77b5fe 0%, #4a90e2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(119,181,254,0.4);
            max-width: 300px;
            margin: 0 auto;
        }

        .your-choice-label {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 5px;
        }

        .your-choice-value {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
        }

        .results-list {
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .result-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .result-item.highlight {
            border-color: #77b5fe;
            background: rgba(119,181,254,0.15);
        }

        .result-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-option {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .result-stats {
            text-align: right;
        }

        .result-votes {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .result-percentage {
            font-size: 20px;
            font-weight: 900;
            color: #ffd700;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #77b5fe 0%, #4a90e2 100%);
            border-radius: 10px;
            transition: width 1s ease;
            width: 0;
        }

        .back-btn {
            width: calc(100% - 40px);
            margin: 0 20px 30px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 15px;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        /* Telegram 按鈕 */
        .telegram-btn {
            width: calc(100% - 40px);
            margin: 0 20px 30px;
            background: linear-gradient(135deg, #0088cc 0%, #229ED9 100%);
            border: none;
            border-radius: 50px;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
        }

        .telegram-btn:hover {
            background: linear-gradient(135deg, #229ED9 0%, #0088cc 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.6);
        }

        .telegram-btn img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(37,211,102,0.4);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(37,211,102,0.6);
        }

        .whatsapp-float svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        @media (max-width: 480px) {
            .hero {
                height: 550px;
            }

            .result-hero {
                height: 400px;
            }
            
            .main-title {
                font-size: 28px;
            }
            
            .sub-title {
                font-size: 16px;
            }
            
            .prize-box {
                padding: 12px 18px;
            }
            
            .prize-value {
                font-size: 18px;
            }

            .result-title {
                font-size: 24px;
            }
        }

        /* 動畫特效 */
        /* 文字閃爍動畫 */
        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 30px #ffd700;
            }
            50% {
                text-shadow: 0 0 20px #ffed4e, 0 0 30px #ffed4e, 0 0 40px #ffed4e;
            }
        }

        /* 文字彈跳動畫 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 脈衝動畫 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 強力縮放動畫 - 用於獎金區塊 */
        @keyframes pulseBig {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            }
            50% { 
                transform: scale(1.1);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            }
        }

        /* 金幣掉落 */
        @keyframes coinFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(600px) rotate(720deg);
                opacity: 0;
            }
        }

        /* 彩帶飄落 */
        @keyframes confettiFall {
            0% {
                transform: translateY(-50px) rotate(0deg) rotateY(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            95% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(calc(100vh + 100px)) rotate(720deg) rotateY(1080deg);
                opacity: 0;
            }
        }

        @keyframes sway {
            0%, 100% {
                transform: translateX(-20px);
            }
            50% {
                transform: translateX(20px);
            }
        }

        /* 閃光效果 */
        @keyframes shine {
            0% {
                left: -100%;
            }
            100% {
                left: 200%;
            }
        }

        /* 星星閃爍 */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 應用動畫到元素 */
        .main-title {
            animation: glow 2s ease-in-out infinite;
        }

        .prize-value {
            animation: pulse 2s ease-in-out infinite;
        }

        .submit-btn {
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        /* 金幣容器 */
        .coin-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 彩帶樣式 */
        .confetti {
            position: absolute;
            width: 8px;
            height: 25px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 237, 78, 0.6) 50%, rgba(255, 165, 0, 0.4) 100%);
            animation: confettiFall 4s linear infinite, sway 2s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
            border-radius: 2px;
            opacity: 0.6;
        }

        /* 不同彩帶變化 */
        .confetti.gold {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.5) 0%, rgba(255, 237, 78, 0.7) 50%, rgba(255, 215, 0, 0.5) 100%);
        }

        .confetti.orange {
            background: linear-gradient(135deg, rgba(255, 165, 0, 0.4) 0%, rgba(255, 183, 50, 0.6) 50%, rgba(255, 165, 0, 0.4) 100%);
        }

        .confetti.yellow {
            background: linear-gradient(135deg, rgba(255, 237, 78, 0.4) 0%, rgba(255, 249, 163, 0.6) 50%, rgba(255, 237, 78, 0.4) 100%);
        }

        .confetti.wide {
            width: 12px;
            height: 18px;
            opacity: 0.5;
        }

        .confetti.thin {
            width: 5px;
            height: 30px;
            opacity: 0.4;
        }

        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            animation: coinFall 3s linear infinite;
        }

        .coin::before {
            content: '💰';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
        }

        /* 星星效果 */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: twinkle 2s ease-in-out infinite;
        }

        /* 煙火效果 */
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: fireworkExplode 1s ease-out forwards;
        }

        @keyframes fireworkExplode {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        /* 結果頁標題特效 */
        .result-title {
            animation: bounce 1s ease-in-out infinite;
        }

        /* 選項按鈕特效 */
        .option-btn {
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            animation: pulse 0.5s ease-in-out;
        }

        /* 進度條填充動畫 */
        .progress-fill {
            background: linear-gradient(90deg, #77b5fe 0%, #4a90e2 50%, #77b5fe 100%);
            background-size: 200% 100%;
            animation: progressShine 2s linear infinite;
        }

        @keyframes progressShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 獎金數字跳動 */
        .total-votes {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>

    <script>
        const optionButtons = document.querySelectorAll('.option-btn');
        const submitBtn = document.getElementById('submitBtn');
        const votingPage = document.getElementById('votingPage');
        const resultPage = document.getElementById('resultPage');
        let selectedOption = null;

        const optionLabels = {
            'champion': '冠军',
            'semifinal': '4强',
            'quarterfinal': '8强',
            'round16': '16强'
        };

        // Handle option selection
        optionButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                optionButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedOption = btn.dataset.value;
                submitBtn.disabled = false;
            });
        });

        // Handle form submission
        submitBtn.addEventListener('click', () => {
            if (!selectedOption) return;

            // Generate random vote data
            const totalVotes = Math.floor(Math.random() * 50000) + 80000;
            const votes = generateVoteData(totalVotes, selectedOption);

            // Show result page
            votingPage.style.display = 'none';
            resultPage.classList.add('active');

            // Display results
            displayResults(votes, totalVotes, selectedOption);

            // Scroll to top
            window.scrollTo(0, 0);
        });

        function generateVoteData(total, userChoice) {
            let remaining = total;
            const votes = {};
            
            votes.champion = Math.floor(total * (0.40 + Math.random() * 0.10));
            remaining -= votes.champion;
            
            votes.semifinal = Math.floor(remaining * (0.35 + Math.random() * 0.10));
            remaining -= votes.semifinal;
            
            votes.quarterfinal = Math.floor(remaining * (0.50 + Math.random() * 0.15));
            remaining -= votes.quarterfinal;
            
            votes.round16 = remaining;

            if (userChoice && votes[userChoice]) {
                const boost = Math.floor(total * 0.02);
                votes[userChoice] += boost;
            }

            return votes;
        }

        function displayResults(votes, total, userChoice) {
            document.getElementById('totalVotes').textContent = total.toLocaleString();
            document.getElementById('userChoice').textContent = optionLabels[userChoice];

            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            const sortedOptions = Object.entries(votes).sort((a, b) => b[1] - a[1]);

            sortedOptions.forEach(([option, voteCount]) => {
                const percentage = ((voteCount / total) * 100).toFixed(1);
                const isUserChoice = option === userChoice;

                const resultItem = document.createElement('div');
                resultItem.className = `result-item ${isUserChoice ? 'highlight' : ''}`;
                resultItem.innerHTML = `
                    <div class="result-header-row">
                        <div class="result-option">${optionLabels[option]}</div>
                        <div class="result-stats">
                            <div class="result-votes">${voteCount.toLocaleString()} 票</div>
                            <div class="result-percentage">${percentage}%</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" data-width="${percentage}"></div>
                    </div>
                `;
                resultsList.appendChild(resultItem);
            });

            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.dataset.width + '%';
                });
            }, 100);
        }

        // 金幣掉落特效 -> 改為彩帶飄落
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            
            // 隨機樣式
            const styles = ['gold', 'orange', 'yellow'];
            const sizes = ['', 'wide', 'thin'];
            const randomStyle = styles[Math.floor(Math.random() * styles.length)];
            const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
            
            confetti.classList.add(randomStyle);
            if (randomSize) confetti.classList.add(randomSize);
            
            // 隨機位置 - 確保從整個頂部開始
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-50px'; // 從頂部上方開始
            confetti.style.animationDelay = Math.random() * 1 + 's';
            confetti.style.animationDuration = (Math.random() * 3 + 4) + 's'; // 4-7秒，確保完整掉落
            
            document.getElementById('coinContainer').appendChild(confetti);
            
            // 自動清理 - 延長時間確保動畫完成
            setTimeout(() => {
                confetti.remove();
            }, 8000);
        }

        // 持續產生彩帶
        function startConfettiRain() {
            setInterval(createConfetti, 400); // 從200改為400，減少一半數量
        }

        // 煙火特效
        function createFirework(x, y) {
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f7b731', '#5f27cd'];
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // 創建星星背景
        function createStars() {
            const heroSections = document.querySelectorAll('.hero, .result-hero');
            heroSections.forEach(section => {
                for (let i = 0; i < 50; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 2 + 's';
                    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    section.appendChild(star);
                }
            });
        }

        // 按鈕點擊煙火效果
        submitBtn.addEventListener('click', function(e) {
            if (!selectedOption) return;
            
            // 觸發煙火
            const rect = this.getBoundingClientRect();
            createFirework(rect.left + rect.width / 2, rect.top + rect.height / 2);
            
            // 停止彩帶雨
            document.getElementById('coinContainer').innerHTML = '';
        });

        // 選項按鈕點擊特效
        optionButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                createFirework(rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
        });

        // 頁面載入時啟動特效
        window.addEventListener('load', () => {
            createStars();
            startConfettiRain();
        });

        // 結果頁顯示時的慶祝特效
        const originalDisplayResults = displayResults;
        displayResults = function(votes, total, userChoice) {
            originalDisplayResults(votes, total, userChoice);
            
            // 連續煙火慶祝
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * window.innerHeight * 0.5;
                        createFirework(x, y);
                    }, i * 300);
                }
            }, 500);
            
            // 重新開始彩帶雨
            startConfettiRain();
        };
    </script>
